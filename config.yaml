# ============================================================================
# Multi-Index Options Data Lake Configuration
# ============================================================================
# Production-ready configuration for NIFTY and SENSEX options historical data

# Indices Configuration
# Defines the indices to process, their exchange segments, and strike intervals
indices:
  - name: NIFTY
    exchange_segment: NFO
    instrument_type: OPTIDX
    strike_step: 50
    spot_symbol: NIFTY
    spot_token: "99926000"

  - name: SENSEX
    exchange_segment: BFO
    instrument_type: OPTIDX
    strike_step: 100
    spot_symbol: SENSEX
    spot_token: "99926047"

# Expiry Mode: current, specific, or all
# - current: Process only the nearest valid expiry >= today
# - specific: Process only the specified expiry date (requires specific_expiry)
# - all: Process all available expiries from the instrument master
expiry_mode: current
specific_expiry: null  # Format: YYYY-MM-DD (e.g., "2026-05-28")

# Option Types to Download
option_types:
  - CE  # Call European
  - PE  # Put European

# Data Intervals to Download
# Supported: ONE_MINUTE, THREE_MINUTE, FIVE_MINUTE, TEN_MINUTE, 
#            FIFTEEN_MINUTE, THIRTY_MINUTE, ONE_HOUR, ONE_DAY
intervals:
  - ONE_MINUTE
  - THREE_MINUTE
  - FIVE_MINUTE

# Download Configuration
download_config:
  # Mode: full (from lookback date) or incremental (append new data)
  mode: incremental
  
  # How many days before expiry to start downloading
  lookback_days: 365
  
  # API request timeout in seconds
  request_timeout: 30
  
  # Number of parallel downloads
  parallel_downloads: 5
  
  # Retry configuration
  max_retries: 3
  retry_wait_seconds: 5
  
  # Rate limiting
  requests_per_minute: 60
  
  # Resume from checkpoint on restart
  resume_on_restart: true
  
  # Chunk size: number of days per API request
  chunk_size_days: 7

# Data Layer Configuration
data_layer:
  # Storage format: parquet (optimized for analytics)
  storage_format: parquet
  
  # Compression: snappy, gzip, brotli, lz4, zstd, uncompressed
  compression: snappy
  
  # Include raw metadata in files
  include_raw_metadata: false

# Validation Configuration
validation:
  # Validate after every download
  validate_after_download: true
  
  # Remove duplicate timestamps during validation
  remove_duplicates: true
  
  # Validate OHLC logical relationships
  validate_ohlc_logic: true
  
  # Check for negative volumes
  check_negative_volumes: true

# Data Lake Path
# Root directory for storing raw, cleaned, metadata, and logs
data_lake_path: ./data_lake

# Logging Configuration
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  
  # Log to console
  console_output: true
  
  # Log files
  log_dir: ./logs
  
  # Individual log files
  download_log: download.log
  validation_log: validation.log
  error_log: errors.log
  resume_log: resume.log

# Progress Tracking Configuration
progress_tracking:
  # Backend: json or sqlite
  backend: sqlite
  
  # Database path (for sqlite backend)
  db_path: ./data_lake/metadata/progress.db
  
  # JSON file path (for json backend)
  json_path: ./data_lake/metadata/progress.json

# Performance & Features
performance:
  # Enable multi-threading for downloads
  use_threading: true
  
  # Number of worker threads
  worker_threads: 5
  
  # Enable disk caching for instrument master
  cache_instruments: true
  
  # Instrument master cache age in days
  instrument_cache_days: 7

# Output Configuration
output:
  # Automatically generate data summaries
  generate_summaries: true
  
  # Save JSON manifest of each download session
  save_session_manifest: true
  
  # Enable data lake health check reports
  enable_health_checks: true
